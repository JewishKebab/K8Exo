apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nexus
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://stevehipwell.github.io/helm-charts/
      chart: nexus3
      targetRevision: "5.21.0"
      helm:
        valueFiles:
          - $values/helm-values/nexus/values.yaml
    - repoURL: https://github.com/JewishKebab/K8Exo
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
