apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dify
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    # Upstream Helm chart
    - repoURL: https://langgenius.github.io/dify-helm
      chart: dify
      targetRevision: "2.8.0"
      helm:
        valueFiles:
          - $values/helm-values/dify/values.yaml
    # Our values live in this repo
    - repoURL: https://github.com/JewishKebab/K8Exo
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
