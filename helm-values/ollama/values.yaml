ollama:
  gpu:
    enabled: false   # device plugin not used in WSL2; GPU access via runtimeClassName below
    type: nvidia
    number: 0
  # Models to pull on startup — fits comfortably on RTX 3060 12GB
  models:
    - llama3.2
    - llama3.1:8b
    - nomic-embed-text   # for embeddings / Qdrant ingestion

# Use the NVIDIA container runtime so Ollama can see the GPU in WSL2
runtimeClassName: nvidia

# Expose GPU to the container via env var (bypasses device plugin requirement)
extraEnv:
  - name: NVIDIA_VISIBLE_DEVICES
    value: "all"
  - name: NVIDIA_DRIVER_CAPABILITIES
    value: "compute,utility"

resources:
  requests:
    memory: "2Gi"
    cpu: "1"
  limits:
    memory: "10Gi"
    cpu: "4"

persistentVolume:
  enabled: true
  size: 30Gi
  storageClass: "local-path"   # k3s built-in storage class

service:
  type: ClusterIP
  port: 11434

# Liveness/readiness give the model time to load
livenessProbe:
  initialDelaySeconds: 60
  periodSeconds: 10

readinessProbe:
  initialDelaySeconds: 30
  periodSeconds: 10
