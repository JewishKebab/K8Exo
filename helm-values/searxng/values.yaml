searxng:
  config:
    use_default_settings: true
    server:
      secret_key: "changeme-random-secret"
      limiter: false      # disable rate limiting (single user)
      image_proxy: true
    search:
      safe_search: 0
      autocomplete: "google"
      default_lang: "en"
    engines:
      - name: google
        disabled: false
      - name: bing
        disabled: false
      - name: duckduckgo
        disabled: false

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"
