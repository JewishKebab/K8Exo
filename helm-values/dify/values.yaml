global:
  useTLS: false
  externalPort: 80
  appSecretKey: "changeme-replace-with-openssl-rand-base64-42"
  innerApiKey: "changeme-replace-with-openssl-rand-base64-42"

# ── API (backend) ────────────────────────────────────────────────────────────
api:
  replicas: 1
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "2"
  extraEnv:
    - name: OLLAMA_API_BASE
      value: "http://ollama.platform.svc.cluster.local:11434"

# ── Worker (async tasks: embeddings, indexing) ───────────────────────────────
worker:
  replicas: 1
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "2"
  extraEnv:
    - name: OLLAMA_API_BASE
      value: "http://ollama.platform.svc.cluster.local:11434"

# ── Web (frontend) ───────────────────────────────────────────────────────────
web:
  replicas: 1
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "1"

# ── Sandbox (code execution) ─────────────────────────────────────────────────
sandbox:
  replicas: 1
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "1"

# ── PostgreSQL (bundled) ─────────────────────────────────────────────────────
postgresql:
  enabled: true
  global:
    storageClass: "local-path"
    postgresql:
      auth:
        postgresPassword: "difypostgres"
        database: "dify"
  primary:
    persistence:
      enabled: true
      size: 10Gi

# ── Redis (bundled) ──────────────────────────────────────────────────────────
redis:
  enabled: true
  global:
    redis:
      password: "difyredis"
  master:
    persistence:
      enabled: true
      size: 2Gi
      storageClass: "local-path"

# ── Vector DB — use bundled Qdrant ───────────────────────────────────────────
vectorDB:
  useExternal: false

qdrant:
  enabled: true
  replicaCount: 1
  apiKey: "difyqdrant"
  persistence:
    size: 10Gi
    storageClass: "local-path"

weaviate:
  enabled: false

# ── Storage (local filesystem in PVC) ────────────────────────────────────────
storage:
  type: "local"
  local:
    persistence:
      enabled: true
      size: 20Gi
      storageClass: "local-path"
