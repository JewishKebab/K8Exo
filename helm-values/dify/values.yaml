global:
  useTLS: false
  appSecretKey: "changeme-replace-with-openssl-rand-base64-42"
  edition: "COMMUNITY"

enterprise:
  enabled: false

# ── API (backend) ────────────────────────────────────────────────────────────
api:
  replicas: 1
  resources:
    requests:
      memory: "1Gi"
      cpu: "250m"
    limits:
      memory: "4Gi"
      cpu: "2"
  extraEnv:
    - name: OLLAMA_API_BASE
      value: "http://ollama.platform.svc.cluster.local:11434"
    - name: REDIS_HOST
      value: "dify-redis-master"
    - name: REDIS_PORT
      value: "6379"
    - name: REDIS_PASSWORD
      value: "difyredis"
    - name: CELERY_BROKER_URL
      value: "redis://:difyredis@dify-redis-master:6379/1"
    - name: SERVER_WORKER_AMOUNT
      value: "2"
    - name: GUNICORN_TIMEOUT
      value: "360"

# ── Worker (async tasks: embeddings, indexing) ───────────────────────────────
worker:
  replicas: 1
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "2"
  extraEnv:
    - name: OLLAMA_API_BASE
      value: "http://ollama.platform.svc.cluster.local:11434"
    - name: REDIS_HOST
      value: "dify-redis-master"
    - name: REDIS_PORT
      value: "6379"
    - name: REDIS_PASSWORD
      value: "difyredis"
    - name: CELERY_BROKER_URL
      value: "redis://:difyredis@dify-redis-master:6379/1"

# ── Web (frontend) ───────────────────────────────────────────────────────────
web:
  replicas: 1
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "1"

# ── Sandbox (code execution) ─────────────────────────────────────────────────
sandbox:
  replicas: 1
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "1"

# ── PostgreSQL (bundled) ─────────────────────────────────────────────────────
postgresql:
  enabled: true
  image:
    registry: docker.io
    repository: postgres
    tag: "15"
    pullPolicy: IfNotPresent
  global:
    storageClass: "local-path"
    postgresql:
      auth:
        postgresPassword: "difypostgres"
        database: "dify"
  primary:
    persistence:
      enabled: true
      size: 10Gi

# ── Redis (bundled) ──────────────────────────────────────────────────────────
redis:
  enabled: true
  image:
    registry: docker.io
    repository: redis
    tag: "7.2"
    pullPolicy: IfNotPresent
  global:
    redis:
      password: "difyredis"
  master:
    persistence:
      enabled: true
      size: 2Gi
      storageClass: "local-path"

# ── Vector DB — bundled Qdrant ───────────────────────────────────────────────
vectorDB:
  useExternal: true
  externalType: "qdrant"
  externalQdrant:
    endpoint: "http://dify-qdrant:6333"
    apiKey: "difyqdrant"

qdrant:
  enabled: true
  replicaCount: 1
  apiKey: "difyqdrant"
  persistence:
    accessModes: ["ReadWriteOnce"]
    size: 10Gi
    storageClass: "local-path"

weaviate:
  enabled: false

# ── Persistent storage for uploaded files ────────────────────────────────────
persistence:
  type: "local"
  local:
    persistentVolumeClaim:
      storageClass: "local-path"
      accessModes:
        - ReadWriteOnce
      size: 20Gi
