apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: searxng
  template:
    metadata:
      labels:
        app: searxng
    spec:
      enableServiceLinks: false   # prevent K8s injecting SEARXNG_PORT as a URL
      initContainers:
        - name: copy-config
          image: busybox
          command: ["sh", "-c", "cp /config-ro/settings.yml /etc/searxng/settings.yml && chmod 644 /etc/searxng/settings.yml"]
          volumeMounts:
            - name: config-ro
              mountPath: /config-ro
            - name: config-rw
              mountPath: /etc/searxng
      containers:
        - name: searxng
          image: searxng/searxng:latest
          ports:
            - containerPort: 8080
          env:
            - name: SEARXNG_SECRET
              value: "k8exo-searxng-secret"
          volumeMounts:
            - name: config-rw
              mountPath: /etc/searxng
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: config-ro
          configMap:
            name: searxng-config
        - name: config-rw
          emptyDir: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-config
  namespace: platform
data:
  settings.yml: |
    use_default_settings: true
    server:
      secret_key: "k8exo-searxng-secret"
      limiter: false
      image_proxy: true
    search:
      safe_search: 0
      default_lang: "en"
    formats:
      - html
      - json
---
apiVersion: v1
kind: Service
metadata:
  name: searxng
  namespace: platform
spec:
  selector:
    app: searxng
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
